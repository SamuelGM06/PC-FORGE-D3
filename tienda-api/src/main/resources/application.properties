spring.application.name=tienda-api

# Local development datasource uses in-memory H2 so backend starts without local MySQL.
spring.datasource.url=jdbc:h2:mem:pcforge;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Use production profile only when SPRING_PROFILES_ACTIVE=prod is explicitly set.
# This prevents local startup from trying to connect to Aiven with production credentials.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8080}